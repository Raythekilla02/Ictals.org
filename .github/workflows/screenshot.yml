name: Update screenshot

on:
  push:
    branches: [main]
    paths-ignore:
      - '.github/screenshot.png'
  schedule:
    - cron: '0 0 * * *'  # Every day at midnight UTC
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        run: npm install playwright && npx playwright install chromium --with-deps

      - name: Take screenshot
        run: |
          node -e "
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch();
            const context = await browser.newContext({
              viewport: { width: 1440, height: 900 },
              deviceScaleFactor: 2,
            });
            const page = await context.newPage();
            await page.goto('http://ictals.org', { waitUntil: 'networkidle', timeout: 30000 });
            await page.screenshot({ path: '.github/screenshot.png', fullPage: true });
            await browser.close();
          })();
          "

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/screenshot.png
          git diff --cached --quiet || git commit -m "chore: update screenshot [skip ci]"
          git push
