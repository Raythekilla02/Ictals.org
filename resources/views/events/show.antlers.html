{{ partial:layout }}

<section class="event-hero">
    <h1>{{ title }}</h1>
    <p>{{ year }} • {{ location }}</p>

    {{ if banner_image }}
        <img src="{{ banner_image }}" alt="{{ title }} banner">
    {{ /if }}

    {{ if legacy_url }}
        <p><a href="{{ legacy_url }}" class="btn">View Archived Site</a></p>
    {{ /if }}
</section>

<section class="event-body">
    {{ description }}
</section>

{{ /partial:layout }}
