{{ if event_url }}
    {{ redirect to="{ event_url }" }}
{{ /if }}

{{ if legacy_url }}
    {{ redirect to="{ legacy_url }" }}
{{ /if }}

{{ if legacy_url }}
    <iframe 
        src="{{ legacy_url }}"
        style="width:100%; height:1200px; border:none;"
        loading="lazy">
    </iframe>
{{ else }}
    {{ content }}
{{ /if }}
