<section class="event-hero">
    <h1>{{ title }}</h1>
    <p>{{ year }} • {{ location }}</p>

  {{ banner_image }}
    <img src="{{ url }}" alt="{{ title }} banner" class="w-full max-w-4xl mx-auto">
{{ /banner_image }}

    {{ if legacy_url }}
     <iframe 
        src="{{ legacy_url }}" 
        style="width:100%; height:1200px; border:none;"
        loading="lazy">
    </iframe>    
    {{ /if }}
    
</section>

<section class="event-body">
    {{ description }}
</section>
