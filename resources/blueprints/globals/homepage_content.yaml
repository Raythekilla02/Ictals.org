title: 'Homepage Content'
preview_targets:
  -
    id: home
    label: Homepage
    url: /
tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: mission_lead
            field:
              type: textarea
              display: 'Mission Lead Paragraph'
          -
            handle: mission_body
            field:
              type: textarea
              display: 'Mission Main Body'
          -
            handle: future_event_title
            field:
              type: text
              display: 'Future Event Title / Year'
          -
            handle: future_event_location
            field:
              type: text
              display: 'Future Event Location'
          -
            handle: future_event_url
            field:
              type: text
              display: 'Future Event URL'
          -
            handle: is_past_event
            field:
              type: toggle
              display: 'Move to Past Events?'
              instructions: 'Turn this on to automatically move this event down next to 2025.'
              default: false