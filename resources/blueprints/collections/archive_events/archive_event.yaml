title: Archive Event
tabs:
  main:
    display: Archive Event Details
    sections:
      - display: "Basic Info"
        fields:
          - handle: title
            field:
              type: text
              display: "Event Name"
              instructions: "e.g. IWSP 7 — 2015"
              validate: required
          - handle: year
            field:
              type: integer
              display: "Year"
              instructions: "Used for ordering."
          - handle: location
            field:
              type: text
              display: "Location"
              instructions: "e.g. Melbourne, Australia"
          - handle: event_url
            field:
              type: text
              display: "Website Link"
              instructions: "Where the card links to when clicked."
