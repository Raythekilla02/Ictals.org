title: Main Website
tabs:
  main:
    display: Homepage Content
    sections:
      - display: "Mission Section"
        fields:
          - handle: mission_lead
            field:
              type: textarea
              display: "Mission — Opening Line"
              instructions: "Bold intro sentence in the Our Mission section."
          - handle: mission_body
            field:
              type: textarea
              display: "Mission — Main Paragraph"
              instructions: "Main paragraph describing what ICTALS does."
          - handle: mission_footer
            field:
              type: textarea
              display: "Mission — Closing Line"
              instructions: "Short closing line crediting the Alliance for Epilepsy Research."

      - display: "Future Events"
        fields:
          - handle: next_event_blurb
            field:
              type: text
              display: "Announcement Banner"
              instructions: "The highlighted line above the event cards."
          - handle: event_2027_title
            field:
              type: text
              display: "2027 Event — Name"
              instructions: "e.g. ICTALS 2027"
          - handle: event_2027_location
            field:
              type: text
              display: "2027 Event — Location"
              instructions: "e.g. Newcastle, United Kingdom"
          - handle: event_2027_url
            field:
              type: text
              display: "2027 Event — Website Link"
              instructions: "Link for the 2027 event card."
          - handle: event_2027_banner
            field:
              type: assets
              display: "2027 Event — Banner Image"
              instructions: "Photo shown on the 2027 event card."
              max_files: 1
              container: assets
          - handle: event_2027_files
            field:
              type: grid
              display: "2027 Event — Website Files"
              instructions: "Add a row for each file that belongs to this event's website — e.g. index.html, contact-us.html, gallery.html, location.html, robots.txt, sitemap.xml. Click Add File to add more."
              add_row: "Add File"
              fields:
                - handle: file_label
                  field:
                    type: text
                    display: "File Name"
                    instructions: "e.g. index.html, contact-us.html, gallery.html, location.html"
                - handle: file
                  field:
                    type: assets
                    display: "Select File"
                    container: assets
                    max_files: 1
          - handle: future_events
            field:
              type: grid
              display: "Additional Future Events"
              instructions: "Add new future events here. Each one will appear as a card on the website next to ICTALS 2027."
              add_row: "Add Future Event"
              fields:
                - handle: event_title
                  field:
                    type: text
                    display: "Event Name"
                    instructions: "e.g. ICTALS 2029"
                - handle: event_location
                  field:
                    type: text
                    display: "Location"
                    instructions: "e.g. Lisbon, Portugal"
                - handle: event_url
                  field:
                    type: text
                    display: "Website Link"
                - handle: event_banner
                  field:
                    type: assets
                    display: "Banner Image"
                    max_files: 1
                    container: assets
                - handle: event_files
                  field:
                    type: grid
                    display: "Event Website Files"
                    instructions: "Add a row for each file that belongs to this event's website — e.g. index.html, contact-us.html, gallery.html, location.html, robots.txt, sitemap.xml."
                    add_row: "Add File"
                    fields:
                      - handle: file_label
                        field:
                          type: text
                          display: "File Name"
                          instructions: "e.g. index.html, contact-us.html, gallery.html, location.html"
                      - handle: file
                        field:
                          type: assets
                          display: "Select File"
                          container: assets
                          max_files: 1

      - display: "Past Events"
        fields:
          - handle: event_2025_title
            field:
              type: text
              display: "2025 Event — Name"
          - handle: event_2025_location
            field:
              type: text
              display: "2025 Event — Location"
          - handle: event_2025_url
            field:
              type: text
              display: "2025 Event — Website Link"
          - handle: event_2022_title
            field:
              type: text
              display: "2022 Event — Name"
          - handle: event_2022_location
            field:
              type: text
              display: "2022 Event — Location"
          - handle: event_2022_url
            field:
              type: text
              display: "2022 Event — Website Link"
          - handle: event_2019_title
            field:
              type: text
              display: "2019 Event — Name"
          - handle: event_2019_location
            field:
              type: text
              display: "2019 Event — Location"
          - handle: event_2019_url
            field:
              type: text
              display: "2019 Event — Website Link"
          - handle: event_2017_title
            field:
              type: text
              display: "2017 Event — Name"
          - handle: event_2017_location
            field:
              type: text
              display: "2017 Event — Location"
          - handle: event_2017_url
            field:
              type: text
              display: "2017 Event — Website Link"

      - display: "Contact & Footer"
        fields:
          - handle: contact_email
            field:
              type: text
              display: "Contact Email"
              instructions: "Email shown in the contact section."
          - handle: copyright_text
            field:
              type: text
              display: "Copyright Text"
              instructions: "Footer copyright line."
