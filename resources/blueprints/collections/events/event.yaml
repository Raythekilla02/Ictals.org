title: Event
tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              validate:
                - required
          -
            handle: year
            field:
              type: text
              display: Year
          -
            handle: location
            field:
              type: text
              display: Location
          -
            handle: legacy_url
            field:
              type: text
              display: 'Legacy URL'
          -
            handle: banner_image
            field:
              container: assets
              type: assets
              display: 'Banner Image'
          -
            handle: content
            field:
              type: textarea
              display: Description
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            handle: slug
            field:
              type: slug
              localizable: true
              validate: 'max:200'
