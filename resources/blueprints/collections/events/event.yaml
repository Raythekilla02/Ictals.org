title: Event
tabs:
  main:
    display: Event Details
    sections:
      - display: "Basic Info"
        fields:
          - handle: title
            field:
              type: text
              display: "Event Name"
              instructions: "e.g. ICTALS 2029"
              validate: required
          - handle: year
            field:
              type: integer
              display: "Year"
              instructions: "Used for ordering. Higher year appears first."
          - handle: location
            field:
              type: text
              display: "Location"
              instructions: "e.g. Newcastle, United Kingdom"
          - handle: event_url
            field:
              type: text
              display: "Website Link"
              instructions: "Where the card links to when clicked."
          - handle: banner_image
            field:
              type: assets
              display: "Banner Image"
              instructions: "Photo shown on the event card. Leave empty for no image."
              max_files: 1
              container: assets
      - display: "Status"
        fields:
          - handle: is_past_event
            field:
              type: toggle
              display: "Move to Past Events"
              instructions: "Turn ON when the event has passed. It will automatically move from Future Events to Past Events on the homepage."
