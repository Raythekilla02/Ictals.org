title: Event
tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              display: "Event Name"
              instructions: "e.g. ICTALS 2029"
          -
            handle: year
            field:
              type: integer
              display: "Year"
              instructions: "Used for ordering. Higher year appears first."
          -
            handle: location
            field:
              type: text
              display: "Location"
              instructions: "e.g. Newcastle, United Kingdom"
          -
            handle: event_url
            field:
              type: text
              display: "Website Link"
              instructions: "Where the card links to when clicked."
          -
            handle: banner_image
            field:
              type: assets
              display: "Banner Image"
              instructions: "Optional photo shown on the card. Leave empty for no image."
              max_files: 1
              container: assets
          -
            handle: legacy_url
            field:
              type: text
              display: 'Legacy URL'
          -
            handle: content
            field:
              type: textarea
              display: Description
          -
            handle: is_past_event
            field:
              type: toggle
              display: "Move to Past Events"
              instructions: "Turn this on when the event has passed — it automatically moves from Future Events to Past Events on the homepage."

  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            handle: slug
            field:
              type: slug
              generate: false
